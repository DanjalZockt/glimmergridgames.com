<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Glimmer Grid Games</title>
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#4a1d96">
    <link rel="icon" type="image/png" href="images/glimmergrid_logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Nunito', sans-serif;
            color: #fff;
            background: linear-gradient(135deg, #1a0533, #2d1054, #4a1d96, #667eea, #4a1d96, #2d1054);
            background-size: 400% 400%;
            animation: gradientShift 18s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            overflow: hidden;
            position: relative;
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50%      { background-position: 100% 50%; }
        }
        .wrap { position: relative; z-index: 2; max-width: 560px; }
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            margin-bottom: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-10px); }
        }
        .code {
            font-family: 'Fredoka One', cursive;
            font-size: clamp(5rem, 18vw, 9rem);
            background: linear-gradient(135deg, #667eea, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 10px;
        }
        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            margin-bottom: 14px;
        }
        p {
            color: rgba(255,255,255,0.8);
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .actions {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 26px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.95rem;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #f093fb);
            color: #fff;
            box-shadow: 0 8px 24px rgba(102,126,234,0.4);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.25);
            backdrop-filter: blur(10px);
        }
        .btn:hover { transform: translateY(-3px); }
        .btn-primary:hover { box-shadow: 0 12px 32px rgba(102,126,234,0.55); }
    </style>
</head>
<body>
    <div class="wrap">
        <img src="images/glimmergrid_logo.png" alt="Glimmer Grid Games" class="logo">
        <div class="code">404</div>
        <h1>This block didn't fit</h1>
        <p>The page you're looking for doesn't exist — maybe it cleared with a combo. Let's get you back to the puzzle.</p>
        <div class="actions">
            <a href="/" class="btn btn-primary">🏠 Back to Home</a>
            <a href="https://play.google.com/store/apps/details?id=com.glimmergridgames.blockstarjourney" class="btn btn-secondary" target="_blank" rel="noopener">▶ Play on Google Play</a>
        </div>
    </div>
</body>
</html>
